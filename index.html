<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ままスケ｜AI妊婦サポート</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FDF8FF;
  --bg2:#F8F2FF;
  --bg3:#F0E8FF;
  --card:#FFFFFF;
  --card2:#F8F2FF;
  --border:rgba(180,100,255,0.15);
  --border2:rgba(255,120,180,0.25);
  --pink:#E8489A;
  --pink2:#D4348A;
  --pink3:rgba(232,72,154,0.08);
  --purple:#9B4DFF;
  --purple2:#7B2FE0;
  --purple3:rgba(155,77,255,0.08);
  --grad:linear-gradient(135deg,#E8489A,#9B4DFF);
  --grad2:linear-gradient(135deg,#9B4DFF,#5B6EFF);
  --grad3:linear-gradient(135deg,#E8489A 0%,#9B4DFF 50%,#5B6EFF 100%);
  --teal:#0D9488;
  --amber:#D97706;
  --green:#059669;
  --red:#DC2626;
  --text:#1F1235;
  --text2:#4A3070;
  --text3:#9B80C0;
  --glow:0 0 20px rgba(155,77,255,0.2);
  --glow2:0 0 20px rgba(232,72,154,0.18);
  --shadow:0 4px 20px rgba(155,77,255,0.1);
  --r:18px;--r2:12px;--r3:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
.serif{font-family:'Playfair Display',serif}

/* scrollbar */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px;opacity:.4}

/* layout */
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}
.bg-orb{position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0}
.orb1{width:280px;height:280px;background:rgba(155,77,255,0.07);top:-80px;left:-80px}
.orb2{width:220px;height:220px;background:rgba(232,72,154,0.06);bottom:80px;right:-60px}
.orb3{width:160px;height:160px;background:rgba(91,110,255,0.05);top:40%;left:50%;transform:translateX(-50%)}

.header{position:sticky;top:0;z-index:50;background:rgba(253,248,255,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px 10px}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;background:var(--grad);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:var(--glow2)}
.logo-text{font-size:16px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.settings-btn{width:32px;height:32px;border-radius:50%;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .2s}
.settings-btn:hover{border-color:var(--purple);box-shadow:var(--glow)}

/* week bar */
.week-strip{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.week-chip{background:var(--grad);color:white;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.planned-chip{background:var(--grad2);color:white;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.days-text{font-size:11px;color:var(--text3)}
.days-text strong{color:var(--pink2)}
.pbar{height:4px;background:var(--card2);border-radius:2px;overflow:hidden;margin-top:6px}
.pbar-fill{height:100%;background:var(--grad3);border-radius:2px;transition:width .6s ease}

/* bottom nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(253,248,255,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:50;padding:4px 0 calc(4px + env(safe-area-inset-bottom))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px 5px;cursor:pointer;border:none;background:transparent;position:relative}
.nav-icon{font-size:19px;line-height:1;transition:transform .2s}
.nav-label{font-size:8px;color:var(--text3);font-weight:600;letter-spacing:.2px;transition:color .2s}
.nav-btn.active .nav-label{color:var(--pink)}
.nav-btn.active .nav-icon{transform:translateY(-1px)}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--grad);border-radius:1px}

/* content */
.content{flex:1;overflow-y:auto;padding:14px 14px calc(80px + env(safe-area-inset-bottom));position:relative;z-index:1}

/* cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(155,77,255,0.2),transparent)}
.card-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px;letter-spacing:.3px;text-transform:uppercase}
.card-accent{width:3px;height:14px;background:var(--grad);border-radius:2px}

/* hero card */
.hero-card{background:var(--grad);border-radius:var(--r);padding:18px;margin-bottom:10px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(181,110,255,0.3)}
.hero-card::after{content:'';position:absolute;right:-20px;bottom:-20px;width:100px;height:100px;background:rgba(255,255,255,0.08);border-radius:50%}
.hero-week{font-size:36px;font-weight:700;font-family:'Playfair Display',serif;color:white;line-height:1}
.hero-sub{font-size:12px;color:rgba(255,255,255,0.8);margin-top:2px}
.hero-days{font-size:13px;color:rgba(255,255,255,0.9);margin-top:8px;font-weight:500}

/* stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:12px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(155,77,255,0.15),transparent)}
.stat-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.3px;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700;font-family:'Playfair Display',serif;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.stat-unit{font-size:10px;color:var(--text3);display:inline;-webkit-text-fill-color:var(--text3)}
.mini-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:6px}
.mini-bar-fill{height:100%;background:var(--grad);border-radius:2px}

/* mission */
.mission-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(180,100,255,0.08)}
.mission-item:last-child{border-bottom:none}
.m-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--purple);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.m-check.done{background:var(--grad);border-color:transparent;box-shadow:var(--glow)}
.m-check.done::after{content:'✓';color:white;font-size:11px;font-weight:700}
.m-text{font-size:13px;color:var(--text);line-height:1.4}
.m-text.done{text-decoration:line-through;color:var(--text3)}

/* alert */
.alert{background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);border-radius:var(--r2);padding:10px 12px;margin-bottom:8px;display:flex;gap:8px;align-items:flex-start}
.alert-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.alert-text{font-size:11px;color:#FDE68A;line-height:1.5}
.alert.pink{background:rgba(255,107,181,0.08);border-color:rgba(255,107,181,0.25)}
.alert.pink .alert-text{color:var(--pink2)}

/* guide */
.guide-nav{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.g-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card2);font-size:11px;cursor:pointer;color:var(--text3);white-space:nowrap;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s}
.g-btn.active{background:var(--grad);border-color:transparent;color:white;box-shadow:var(--glow2)}
.guide-item{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid rgba(180,100,255,0.07);font-size:12px;color:var(--text2);line-height:1.5}
.guide-item:last-child{border-bottom:none}
.g-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}

/* checklist */
.cat-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.cat-btn{padding:4px 11px;border-radius:16px;border:1px solid var(--border);background:var(--card2);font-size:10px;cursor:pointer;color:var(--text3);white-space:nowrap;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s}
.cat-btn.active{background:var(--grad);border-color:transparent;color:white}
.check-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid rgba(180,100,255,0.07)}
.check-item:last-child{border-bottom:none}
.c-box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--purple);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;transition:all .2s}
.c-box.done{background:var(--grad);border-color:transparent}
.c-box.done::after{content:'✓';color:white;font-size:10px;font-weight:700}
.c-name{font-size:12px;color:var(--text);font-weight:500}
.c-hint{font-size:10px;color:var(--text3);margin-top:2px;line-height:1.4}
.c-price{font-size:9px;color:var(--text3);margin-top:3px}
.c-links{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.c-link{font-size:9px;padding:2px 8px;border-radius:8px;border:1px solid;cursor:pointer;background:transparent;text-decoration:none;display:inline-block;font-weight:600;transition:all .2s}
.c-link.az{border-color:rgba(52,211,153,.4);color:var(--green)}
.c-link.rk{border-color:rgba(251,191,36,.4);color:var(--amber)}
.c-link.rm{border-color:rgba(255,107,181,.4);color:var(--pink)}
.c-action{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.c-btn{font-size:9px;padding:2px 8px;border-radius:8px;border:1px solid;cursor:pointer;background:transparent;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s}
.c-btn.have{border-color:rgba(181,110,255,.35);color:var(--purple2)}
.c-btn.na{border-color:rgba(136,112,170,.25);color:var(--text3)}
.c-btn.undo{border-color:var(--border);color:var(--text3)}

/* health */
.mood-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.mood-btn{padding:8px 4px;border-radius:10px;border:1px solid var(--border);background:var(--card2);cursor:pointer;text-align:center;transition:all .2s}
.mood-btn.sel{border-color:var(--pink);background:var(--pink3);box-shadow:var(--glow2)}
.mood-e{font-size:20px;display:block}
.mood-l{font-size:9px;color:var(--text3);display:block;margin-top:2px;font-weight:600}
.tag-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{padding:4px 10px;border-radius:10px;border:1px solid var(--border);background:var(--card2);font-size:10px;cursor:pointer;color:var(--text3);font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s}
.tag.sel{border-color:var(--purple);background:var(--purple3);color:var(--purple2)}
.tag.green{border:1px solid rgba(45,212,191,.2);color:var(--text3)}
.tag.green.sel{border-color:var(--teal);background:rgba(45,212,191,.1);color:var(--teal)}
.form-inp{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r3);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--card2);color:var(--text);outline:none;transition:border .2s}
.form-inp:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(181,110,255,.1)}
.form-sel{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r3);font-size:12px;font-family:'DM Sans',sans-serif;background:var(--card2);color:var(--text);outline:none}
.form-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;letter-spacing:.3px}

/* AI chat */
.chat-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;max-height:320px;overflow-y:auto;padding-right:2px}
.chat-msg{max-width:88%;padding:10px 12px;border-radius:14px;font-size:12px;line-height:1.6}
.chat-msg.user{align-self:flex-end;background:var(--grad);color:white;border-radius:14px 14px 4px 14px}
.chat-msg.ai{align-self:flex-start;background:var(--card2);color:var(--text2);border:1px solid var(--border);border-radius:14px 14px 14px 4px;white-space:pre-wrap}
.chat-input-row{display:flex;gap:7px;align-items:flex-end}
.chat-input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:12px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--card2);color:var(--text);outline:none;resize:none;max-height:80px}
.chat-input:focus{border-color:var(--purple)}
.chat-send{width:36px;height:36px;border-radius:12px;background:var(--grad);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;box-shadow:var(--glow2);transition:transform .15s}
.chat-send:hover{transform:scale(1.05)}
.chat-quick{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.q-chip{padding:4px 10px;border-radius:10px;border:1px solid var(--border2);background:var(--card2);font-size:10px;cursor:pointer;color:var(--pink2);font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s}
.q-chip:hover{background:var(--pink3)}
.typing{display:flex;gap:4px;align-items:center;padding:2px 0}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--purple2);animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* schedule */
.sch-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid rgba(180,100,255,0.07)}
.sch-item:last-child{border-bottom:none}
.sch-time{font-size:10px;font-weight:700;color:var(--purple2);min-width:38px;padding-top:2px}
.sch-name{font-size:12px;font-weight:500;color:var(--text)}
.sch-sub{font-size:10px;color:var(--text3);margin-top:1px}
.appt-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid rgba(180,100,255,0.07)}
.appt-item:last-child{border-bottom:none}
.appt-date{font-size:10px;font-weight:700;color:var(--pink);min-width:50px;padding-top:2px}
.appt-del{font-size:10px;color:var(--red);background:none;border:none;cursor:pointer;padding:0 4px}
.add-btn{width:100%;padding:9px;border:1.5px dashed var(--border);border-radius:var(--r2);background:transparent;color:var(--purple2);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;margin-top:7px;transition:all .2s}
.add-btn:hover{background:var(--purple3)}
.filter-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.f-btn{padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:var(--card2);font-size:10px;cursor:pointer;color:var(--text3);font-family:'DM Sans',sans-serif;font-weight:600}
.f-btn.active{background:var(--grad);border-color:transparent;color:white}

/* calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav-btn{padding:5px 12px;border:1px solid var(--border);border-radius:var(--r3);background:var(--card2);font-size:11px;cursor:pointer;color:var(--text2);font-family:'DM Sans',sans-serif;font-weight:600}
.cal-title{font-size:14px;font-weight:700;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-head{font-size:9px;text-align:center;padding:4px 0;color:var(--text3);font-weight:700;letter-spacing:.3px}
.cal-cell{min-height:34px;border-radius:8px;padding:3px 2px;cursor:pointer;transition:background .15s;position:relative}
.cal-cell:hover{background:var(--card2)}
.cal-cell.today{background:var(--purple3);border:1px solid rgba(181,110,255,.4)}
.cal-cell.sel{background:var(--pink3);border:1px solid rgba(255,107,181,.4)}
.cal-cell.other{opacity:.25}
.cal-dn{font-size:10px;text-align:center;font-weight:600;color:var(--text2)}
.cal-dots{display:flex;justify-content:center;gap:2px;margin-top:2px}
.cal-dot{width:4px;height:4px;border-radius:50%}
.detail-box{background:var(--card2);border:1px solid var(--border);border-radius:var(--r2);padding:12px;margin-top:10px}
.detail-title{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;letter-spacing:.3px}
.detail-row{font-size:11px;color:var(--text2);padding:4px 0;border-bottom:1px solid rgba(180,100,255,0.08);line-height:1.5}
.detail-row:last-child{border-bottom:none}

/* weight chart */
.chart-wrap{width:100%;overflow:hidden;margin-top:4px}

/* resources */
.resource-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(180,100,255,0.07);align-items:flex-start;cursor:pointer}
.resource-item:last-child{border-bottom:none}
.resource-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.resource-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.3}
.resource-meta{font-size:10px;color:var(--text3);margin-top:2px}
.resource-tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:6px;font-weight:700;margin-top:3px}

/* week visual bar */
.wk-bar{position:relative;height:16px;background:var(--card2);border-radius:8px;overflow:hidden;margin:8px 0;border:1px solid var(--border)}
.wk-fill{height:100%;background:var(--grad3);border-radius:8px;transition:width .6s ease}
.wk-planned{position:absolute;top:0;height:100%;background:rgba(107,142,255,.3);border-left:2px solid rgba(107,142,255,.7)}
.wk-markers{display:flex;justify-content:space-between;font-size:8px;color:var(--text3);letter-spacing:.2px}

/* setup overlay */
.setup-ov{position:fixed;inset:0;background:var(--bg);z-index:999;overflow-y:auto;max-width:430px;margin:0 auto}
.setup-hero{background:var(--grad3);padding:28px 18px 22px;position:relative;overflow:hidden}
.setup-hero::after{content:'🌸';font-size:80px;position:absolute;right:-10px;bottom:-15px;opacity:.2}
.setup-htitle{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:white}
.setup-hsub{font-size:12px;color:rgba(255,255,255,.8);margin-top:4px}
.setup-body{padding:18px}
.form-group{margin-bottom:18px}
.radio-wrap{display:flex;flex-wrap:wrap;gap:6px}
.r-btn{padding:7px 13px;border-radius:12px;border:1px solid var(--border);background:var(--card2);font-size:11px;cursor:pointer;color:var(--text3);font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s}
.r-btn.sel{background:var(--grad);border-color:transparent;color:white;box-shadow:var(--glow2)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.toggle{width:38px;height:21px;border-radius:11px;background:var(--card2);border:1px solid var(--border);position:relative;cursor:pointer;transition:all .2s}
.toggle.on{background:var(--grad);border-color:transparent;box-shadow:var(--glow2)}
.toggle-k{width:17px;height:17px;border-radius:50%;background:white;position:absolute;top:1px;left:1px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle.on .toggle-k{transform:translateX(17px)}
.child-box{background:var(--card2);border:1px solid var(--border);border-radius:var(--r2);padding:12px;margin-bottom:8px}
.child-head{display:flex;gap:6px;align-items:center;margin-bottom:10px}
.remove-btn{width:26px;height:26px;border-radius:50%;border:1px solid rgba(248,113,113,.3);background:transparent;color:var(--red);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

function ds(d){return d.toISOString().split('T')[0]}
function getWeek(due){
  if(!due)return 34;
  const d=new Date(due),t=new Date();
  return Math.max(1,Math.min(42,40-Math.round((d-t)/(7*24*60*60*1000))));
}
function getDays(due){
  if(!due)return'—';
  const diff=Math.ceil((new Date(due)-new Date())/(24*60*60*1000));
  return diff>0?diff:0;
}

function TimeSelect({value,onChange}){
  const [h,m]=(value||':').split(':');
  return(
    <div style={{display:'flex',gap:3,alignItems:'center'}}>

        {MNS.map(mm=><option key={mm} value={mm}>{mm}</option>)}
      </select>
    </div>
  );
}

// ─── App ────────────────────────────────────────────────────────
function App(){
  const [profile,setProfile]=useState(()=>{try{const s=localStorage.getItem('ms2_profile');return s?JSON.parse(s):null}catch{return null}});
  const [tab,setTab]=useState(0);
  const [checks,setChecks]=useState(()=>{try{return JSON.parse(localStorage.getItem('ms2_checks')||'{}')}catch{return{}}});
  const [missions,setMissions]=useState(()=>{try{return JSON.parse(localStorage.getItem('ms2_missions')||'{}')}catch{return{}}});
  const [hlog,setHlog]=useState(()=>{try{return JSON.parse(localStorage.getItem('ms2_hlog')||'{}')}catch{return{}}});
  const [appts,setAppts]=useState(()=>{try{return JSON.parse(localStorage.getItem('ms2_appts')||'[]')}catch{return[]}});
  const [workH,setWorkH]=useState(()=>{try{return parseFloat(localStorage.getItem('ms2_work')||'0')}catch{return 0}});
  const [showSetup,setShowSetup]=useState(false);
  const [guideWeek,setGuideWeek]=useState(null);
  const [checkCat,setCheckCat]=useState(Object.keys(CHECKLIST)[0]);

  useEffect(()=>{if(profile)localStorage.setItem('ms2_profile',JSON.stringify(profile))},[profile]);
  useEffect(()=>{localStorage.setItem('ms2_checks',JSON.stringify(checks))},[checks]);
  useEffect(()=>{localStorage.setItem('ms2_missions',JSON.stringify(missions))},[missions]);
  useEffect(()=>{localStorage.setItem('ms2_hlog',JSON.stringify(hlog))},[hlog]);
  useEffect(()=>{localStorage.setItem('ms2_appts',JSON.stringify(appts))},[appts]);
  useEffect(()=>{localStorage.setItem('ms2_work',String(workH))},[workH]);

  const week=profile?Math.max(34,Math.min(40,getWeek(profile.dueDate))):34;
  const daysLeft=profile?getDays(profile.dueDate):56;
  const progress=Math.min(100,Math.round(((week-34)/6)*100));
  useEffect(()=>{if(profile&&!guideWeek)setGuideWeek(week)},[profile,week]);

  const todayKey=ds(new Date());
  const todayH=hlog[todayKey]||{weight:'',mood:'',symptoms:[],fridge:[],memo:''};
  const setTodayH=(upd)=>setHlog(p=>({...p,[todayKey]:typeof upd==='function'?upd(p[todayKey]||{weight:'',mood:'',symptoms:[],fridge:[],memo:''}):upd}));

  const toggleCheck=(cat,i)=>setChecks(p=>({...p,[`${cat}_${i}`]:!p[`${cat}_${i}`],[`${cat}_${i}_na`]:false}));
  const toggleNA=(cat,i)=>setChecks(p=>({...p,[`${cat}_${i}_na`]:!p[`${cat}_${i}_na`],[`${cat}_${i}`]:false}));
  const toggleMission=(i)=>{const k=`${todayKey}_${i}`;setMissions(p=>({...p,[k]:!p[k]}))};
  const isMDone=(i)=>!!missions[`${todayKey}_${i}`];
  const todayMs=(TASKS[week]||TASKS[34]).slice(0,3);

  const getBudget=()=>profile?.budgetOption==='custom'?parseInt(profile?.budgetCustom||0):parseInt(profile?.budgetOption||150000);
  const getBudgetPct=()=>{
    const b=getBudget();if(!b)return 0;
    let s=0;Object.entries(checks).forEach(([k,v])=>{
      if(!v||k.includes('_na'))return;
      const parts=k.split('_');const idx=parseInt(parts[parts.length-1]);
      const cat=parts.slice(0,-1).join('_');const items=CHECKLIST[cat];
      if(items&&items[idx])s+=items[idx].avg||0;
    });
    return Math.min(100,Math.round((s/b)*100));
  };
  const totalItems=Object.values(CHECKLIST).reduce((a,b)=>a+b.length,0);
  const doneItems=Object.keys(checks).filter(k=>checks[k]).length;
  const checkPct=Math.round((doneItems/totalItems)*100);

  const mkLink=(name,type)=>{
    const q=encodeURIComponent(name+' 妊婦');
    if(type==='az')return`https://www.amazon.co.jp/s?k=${q}&tag=${AF.az}`;
    if(type==='rk')return`https://search.rakuten.co.jp/search/mall/${q}/?af_id=${AF.rk}`;
    return'https://room.rakuten.co.jp/';
  };

  const handleUpdate=(upd)=>{setProfile(p=>({...DFLT_PROFILE,...p,...upd}));setShowSetup(false)};

  if(!profile)return<SetupScreen onDone={p=>setProfile({...DFLT_PROFILE,...p})} isFirst={true}/>;
  if(showSetup)return<SetupScreen onDone={handleUpdate} initialData={profile} isFirst={false} onCancel={()=>setShowSetup(false)}/>;

  const TABS=[['🏠','ホーム'],['📖','ガイド'],['📋','準備'],['✨','AI相談'],['📅','予定'],['📆','記録'],['📚','情報']];

  return(
    <div className="app">
      <div className="bg-orb orb1"/><div className="bg-orb orb2"/><div className="bg-orb orb3"/>
      <div className="header">
        <div className="header-top">
          <div className="logo"><div className="logo-icon">🌸</div><span className="logo-text serif">ままスケ</span></div>
          <button className="settings-btn" onClick={()=>setShowSetup(true)}>⚙️</button>
        </div>
        <div className="week-strip">
          <span className="week-chip">{week}週</span>
          {profile.birthType==='planned'&&profile.plannedDate&&<span className="planned-chip">計画日まで{getDays(profile.plannedDate)}日</span>}
          <span className="days-text">出産まで <strong>{daysLeft}日</strong>{profile.name&&` ・ ${profile.name}さん`}</span>
        </div>
        <div className="pbar"><div className="pbar-fill" style={{width:`${progress}%`}}/></div>
      </div>

      <div className="content">
        {tab===0&&<HomeTab week={week} profile={profile} workH={workH} setWorkH={setWorkH} todayMs={todayMs} isMDone={isMDone} toggleMission={toggleMission} budgetPct={getBudgetPct()} checkPct={checkPct} hlog={hlog} appts={appts}/>}
        {tab===1&&<GuideTab week={week} guideWeek={guideWeek} setGuideWeek={setGuideWeek} profile={profile}/>}
        {tab===2&&<CheckTab profile={profile} checks={checks} toggleCheck={toggleCheck} toggleNA={toggleNA} checkCat={checkCat} setCheckCat={setCheckCat} mkLink={mkLink}/>}
        {tab===3&&<AITab week={week} profile={profile} todayH={todayH}/>}
        {tab===4&&<ScheduleTab profile={profile} week={week} appts={appts} setAppts={setAppts}/>}
        {tab===5&&<CalendarTab hlog={hlog} appts={appts}/>}
        {tab===6&&<ResourcesTab health={todayH} setHealth={setTodayH}/>}
      </div>

      <div className="nav">
        {TABS.map(([icon,label],i)=>(
          <button key={i} className={`nav-btn${tab===i?' active':''}`} onClick={()=>setTab(i)}>
            <span className="nav-icon">{icon}</span>
            <span className="nav-label">{label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function WeekVisual({profile}){
  const due=profile?.dueDate;if(!due)return null;
  const dueD=new Date(due);const conceived=new Date(dueD.getTime()-280*24*60*60*1000);
  const today=new Date();const elapsed=Math.floor((today-conceived)/(24*60*60*1000));
  const pct=Math.min(100,Math.max(0,(elapsed/280)*100));
  const wk=Math.floor(elapsed/7);const dy=elapsed%7;

    const pl=new Date(profile.plannedDate);

  }
  return(
    <div style={{marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}>
        <span style={{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,background:'var(--grad)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>妊娠 {wk}週 {dy}日</span>

    </div>
  );
}

// ─── AITab ─────────────────────────────────────────────────
function AITab({week,profile,todayH}){
  const [messages,setMessages]=useState([{role:'ai',text:`こんにちは！妊娠${week}週のあなたをサポートするAIアシスタントです🌸\n\n体調の相談、今日のレシピ提案、妊娠中の疑問など、なんでも気軽に聞いてください。`}]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const chatRef=useRef(null);
  const QUICK=['今日のレシピを提案して','体調について相談したい','むくみを楽にする方法','今週の赤ちゃんの成長は？','産後の準備で大切なことは？','安産のために今できること'];

  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight},[messages]);

  const send=async(text)=>{
    const q=text||input.trim();if(!q||loading)return;
    setInput('');setMessages(p=>[...p,{role:'user',text:q}]);setLoading(true);
    const ctx=`あなたは妊娠${week}週のママをサポートする優しいAIアシスタントです。出産方法：${profile?.birthType==='planned'?'計画分娩':'自然分娩'}、${profile?.pattern==='second'?'上の子あり':'初めての妊娠'}。今日の体重:${todayH?.weight||'未記録'}kg、気分:${todayH?.mood||'不明'}、症状:${(todayH?.symptoms||[]).join('・')||'特になし'}。冷蔵庫:${(todayH?.fridge||[]).join('・')||'未登録'}。日本語で温かみのある口調で答えてください。レシピの場合は具体的な食材と手順を。200字以内で簡潔に。`;
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:ctx,messages:[...messages.filter(m=>m.role!=='ai'||messages.indexOf(m)>0).map(m=>({role:m.role==='user'?'user':'assistant',content:m.text})),{role:'user',content:q}]})});
      const data=await res.json();
      const reply=data.content?.find(b=>b.type==='text')?.text||'うまく取得できませんでした。もう一度お試しください。';
      setMessages(p=>[...p,{role:'ai',text:reply}]);
    }catch{setMessages(p=>[...p,{role:'ai',text:'通信エラーが発生しました。しばらくしてからもう一度お試しください。'}]);}
    setLoading(false);
  };

  return(
    <>
      <div className="card" style={{marginBottom:10}}>
        <div className="card-title"><div className="card-accent"/>✨ AIアシスタントに相談する</div>
        <div className="chat-quick">
          {QUICK.map((q,i)=><button key={i} className="q-chip" onClick={()=>send(q)}>{q}</button>)}
        </div>
        <div className="chat-wrap" ref={chatRef}>
          {messages.map((m,i)=>(
            <div key={i} className={`chat-msg ${m.role}`}>{m.text}</div>
          ))}
          {loading&&<div className="chat-msg ai"><div className="typing"><span/><span/><span/></div></div>}
        </div>
        <div className="chat-input-row">
          <textarea className="chat-input" rows={1} placeholder="メッセージを入力..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}}/>
          <button className="chat-send" onClick={()=>send()}>➤</button>
        </div>
      </div>

      {/* 体調記録（AIタブ内にも簡易版） */}
      <div className="card">
        <div className="card-title"><div className="card-accent"/>📊 今日の体調を入力するとAIがより精確に</div>
        <div style={{fontSize:11,color:'var(--text3)'}}>「記録」タブで体調・食材を入力すると、AIがあなたに合わせた提案をします</div>
      </div>
    </>
  );
}

// ─── CalendarTab ─────────────────────────────────────────────
function CalendarTab({hlog,appts}){
  const today=new Date();
  const [yr,setYr]=useState(today.getFullYear());const [mo,setMo]=useState(today.getMonth());const [sel,setSel]=useState(ds(today));
  const prevM=()=>{if(mo===0){setYr(y=>y-1);setMo(11)}else setMo(m=>m-1)};
  const nextM=()=>{if(mo===11){setYr(y=>y+1);setMo(0)}else setMo(m=>m+1)};
  const cells=useMemo(()=>{
    const fd=new Date(yr,mo,1).getDay();const dim=new Date(yr,mo+1,0).getDate();const dip=new Date(yr,mo,0).getDate();
    const r=[];
    for(let i=fd-1;i>=0;i--)r.push({d:dip-i,m:'p',date:ds(new Date(yr,mo-1,dip-i))});
    for(let d=1;d<=dim;d++)r.push({d,m:'c',date:ds(new Date(yr,mo,d))});
    const rem=42-r.length;for(let d=1;d<=rem;d++)r.push({d,m:'n',date:ds(new Date(yr,mo+1,d))});
    return r;
  },[yr,mo]);
  const ts=ds(today);const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const selH=hlog[sel];const selA=appts.filter(a=>a.date===sel);
  const wts=Object.entries(hlog).filter(([,v])=>v.weight).sort(([a],[b])=>a.localeCompare(b)).slice(-14);
  return(
    <>
      <div className="card">
        <div className="cal-nav">
          <button className="cal-nav-btn" onClick={prevM}>← 前月</button>
          <span className="cal-title">{yr}年 {mn[mo]}</span>
          <button className="cal-nav-btn" onClick={nextM}>次月 →</button>
        </div>
        <div className="cal-grid" style={{marginBottom:4}}>
          {['日','月','火','水','木','金','土'].map((d,i)=><div key={d} className="cal-head" style={{color:i===0?'var(--red)':i===6?'#60A5FA':undefined}}>{d}</div>)}
        </div>
        <div className="cal-grid">
          {cells.map((cell,idx)=>{
            const hasH=!!hlog[cell.date];const hasA=appts.some(a=>a.date===cell.date);
            const dow=idx%7;
            return(
              <div key={idx} className={`cal-cell${cell.date===ts?' today':''}${cell.date===sel?' sel':''}${cell.m!=='c'?' other':''}`} onClick={()=>setSel(cell.date)}>
                <div className="cal-dn" style={{color:dow===0?'var(--red)':dow===6?'#60A5FA':undefined}}>{cell.d}</div>
                <div className="cal-dots">
                  {hasH&&<div className="cal-dot" style={{background:'var(--pink)'}}/>}
                  {hasA&&<div className="cal-dot" style={{background:'var(--teal)'}}/>}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{display:'flex',gap:10,marginTop:8,fontSize:9,color:'var(--text3)'}}>
          <span style={{display:'flex',alignItems:'center',gap:3}}><span style={{width:7,height:7,borderRadius:'50%',background:'var(--pink)',display:'inline-block'}}/> 体調記録</span>
          <span style={{display:'flex',alignItems:'center',gap:3}}><span style={{width:7,height:7,borderRadius:'50%',background:'var(--teal)',display:'inline-block'}}/> 予定あり</span>
        </div>
      </div>
      <div className="detail-box">
        <div className="detail-title">📅 {sel} の記録</div>
        {!selH&&selA.length===0&&<div style={{fontSize:11,color:'var(--text3)'}}>この日の記録はありません</div>}
        {selH&&<>
          {selH.weight&&<div className="detail-row">⚖️ 体重：<strong style={{color:'var(--pink2)'}}>{selH.weight} kg</strong></div>}
          {selH.mood&&<div className="detail-row">😊 気分：{MOODS.find(m=>m.l===selH.mood)?.e} {selH.mood}</div>}
          {(selH.symptoms||[]).length>0&&<div className="detail-row">🤒 症状：{selH.symptoms.join(' ・ ')}</div>}
          {selH.memo&&<div className="detail-row">📝 {selH.memo}</div>}
        </>}
        {selA.map(a=><div key={a.id} className="detail-row">🏥 {a.name}{a.place&&` @ ${a.place}`}</div>)}
      </div>
      {wts.length>=2&&(
        <div className="card" style={{marginTop:10}}>
          <div className="card-title"><div className="card-accent"/>⚖️ 体重の推移（直近{wts.length}日）</div>
          <WeightChart entries={wts}/>
        </div>
      )}
      {/* 体調入力もカレンダータブに */}
      <HealthInputCard hlog={hlog} sel={sel}/>
    </>
  );
}

function HealthInputCard({hlog,sel}){
  const [hlogState,setHlogState]=useState(hlog);

  const set=(upd)=>setHlogState(p=>({...p,[sel]:typeof upd==='function'?upd(p[sel]||{weight:'',mood:'',symptoms:[],fridge:[],memo:''}):upd}));
  useEffect(()=>{localStorage.setItem('ms2_hlog',JSON.stringify(hlogState))},[hlogState]);
  const tog=(k,v)=>set(p=>({...p,[k]:(p[k]||[]).includes(v)?(p[k]||[]).filter(x=>x!==v):[...(p[k]||[]),v]}));
  return(
    <div className="card" style={{marginTop:10}}>

      <label className="form-label">症状</label>

      <textarea className="form-inp" rows={3} placeholder="今日の気持ちや出来事を記録..." value={h.memo||''} onChange={e=>set(p=>({...p,memo:e.target.value}))} style={{resize:'none'}}/>
    </div>
  );
}

function WeightChart({entries}){
  const ws=entries.map(([,v])=>parseFloat(v.weight));
  const mn=Math.min(...ws)-.5;const mx=Math.max(...ws)+.5;const rng=mx-mn||1;
  const W=300,H=72;
  const pts=entries.map(([,v],i)=>{const x=12+(i/(entries.length-1))*(W-24);const y=H-10-((parseFloat(v.weight)-mn)/rng)*(H-20);return`${x},${y}`;});
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%'}}>
      <polyline points={pts.join(' ')} fill="none" stroke="url(#lg)" strokeWidth="2" strokeLinejoin="round"/>
      <defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="#FF6BB5"/><stop offset="100%" stopColor="#B56EFF"/></linearGradient></defs>
      {pts.map((pt,i)=>{const[x,y]=pt.split(',');return<circle key={i} cx={x} cy={y} r="3" fill="#FF6BB5"/>})}
      <text x="10" y={H} fontSize="8" fill="#8870AA">{entries[0][0].slice(5)}</text>
      <text x={W-10} y={H} fontSize="8" fill="#8870AA" textAnchor="end">{entries[entries.length-1][0].slice(5)}</text>
    </svg>
  );
}

          </div>
          {budgetMode==='select'?<select className="form-sel" value={form.budgetOption||150000} onChange={e=>setForm(p=>({...p,budgetOption:parseInt(e.target.value)}))}>
            {BUDGET_OPTS.map(b=><option key={b.v} value={b.v}>{b.l}</option>)}
          </select>:<input className="form-inp" type="number" placeholder="例：180000" value={form.budgetCustom||''} onChange={e=>setForm(p=>({...p,budgetCustom:e.target.value}))}/>}
        </div>

        <div className="form-group">
          <label className="form-label">準備品選択の基準 <span style={{fontWeight:400,color:'var(--text3)'}}>複数選択可</span></label>
          <div className="radio-wrap">{[['min','💰 コスパ'],['avg','⭐ 口コミ'],['high','✨ デザイン・利便性']].map(([v,l])=><button key={v} className={`r-btn${(form.defaultAxis||[]).includes(v)?' sel':''}`} onClick={()=>tog('defaultAxis',v)}>{l}</button>)}</div>
        </div>

        <div className="form-group">
          <label className="form-label">セルフケア <span style={{fontWeight:400,color:'var(--text3)'}}>複数選択可</span></label>
          <div className="radio-wrap">{[['beauty','💄 美容タイム'],['stretch','🧘 ストレッチ'],['walk','🚶 散歩']].map(([v,l])=><button key={v} className={`r-btn${(form.selfcare||[]).includes(v)?' sel':''}`} onClick={()=>tog('selfcare',v)}>{l}</button>)}</div>
        </div>

        <div className="form-group">
          <label className="form-label">ゴミ出し日 <span style={{fontWeight:400,color:'var(--text3)'}}>複数選択可</span></label>
          <div className="radio-wrap">{WD.map(d=><button key={d} className={`r-btn${(form.garbage||[]).includes(d)?' sel':''}`} onClick={()=>tog('garbage',d)}>{d}曜</button>)}</div>
        </div>

        <button className="submit-btn" onClick={()=>form.dueDate&&onDone(form)}>{isFirst?'🌸 スタート！':'変更を保存する'}</button>
        {!isFirst&&<button className="cancel-btn" onClick={onCancel}>キャンセル</button>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
